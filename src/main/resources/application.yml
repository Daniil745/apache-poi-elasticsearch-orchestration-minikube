spring:
  application:
    name: doc-search-backend

  datasource:
    url: jdbc:h2:mem:docsearchdb
    driver-class-name: org.h2.Driver
    username: ${USER_NAME_DATASOURCE}
    password: ${PASSWORD_DATASOURCE}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s

storage:
  upload-dir: ./uploads
  allowed-extensions:
    - xlsx
    - xls
    - docx
    - doc
    - pptx
    - ppt

elasticsearch:
  index:
    name: documents
    number-of-shards: 1
    number-of-replicas: 0

  search:
    default-size: 10
    max-size: 100
    highlight-fragment-size: 150
    highlight-number-of-fragments: 3

logging:
  level:
    com.docsearch: DEBUG
    org.springframework.data.elasticsearch: WARN
    org.elasticsearch.client: WARN