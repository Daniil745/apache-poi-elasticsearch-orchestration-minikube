# DocSearch Application Configuration
# This configuration file defines all settings for the document search platform:
# - H2 database for document metadata persistence
# - Elasticsearch for full-text search and indexing
# - Tesseract OCR for image text extraction
# - Spring AI Ollama for AI-powered document analysis
# - Multipart file upload with 50MB limit
# - Actuator endpoints for health monitoring

spring:
  application:
    name: doc-search-backend

  datasource:
    url: jdbc:h2:mem:docsearchdb
    driver-class-name: org.h2.Driver
    username: ${USER_NAME_DATASOURCE:sa}
    password: ${PASSWORD_DATASOURCE:}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}

  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${SPRING_AI_OLLAMA_CHAT_MODEL:qwen2.5-coder:1.5b}
        options:
          temperature: 0.7
          top-p: 0.9
          max-tokens: 2048
      embedding:
        model: ${SPRING_AI_OLLAMA_EMBEDDINGS_MODEL:qwen2.5-coder:1.5b}
        options:
          temperature: 0.0

storage:
  upload-dir: ${STORAGE_UPLOAD_DIR:./uploads}
  allowed-extensions:
    - xlsx
    - xls
    - docx
    - doc
    - pptx
    - ppt
    - png
    - jpg
    - jpeg
    - tiff
    - bmp
    - webp
    - pdf
    - txt
    - csv

elasticsearch:
  index:
    name: ${ES_INDEX_NAME:documents}
    number-of-shards: ${ES_INDEX_SHARDS:1}
    number-of-replicas: ${ES_INDEX_REPLICAS:0}

  search:
    default-size: 10
    max-size: 100
    highlight-fragment-size: 150
    highlight-number-of-fragments: 3

logging:
  level:
    com.docsearch: DEBUG
    org.springframework.data.elasticsearch: INFO
    org.elasticsearch.client: INFO
    org.springframework.ai: DEBUG

ocr:
  tesseract:
    datapath: ${TESSDATA_PREFIX:/usr/share/tessdata}
    language: ${TESSERACT_LANG:rus+eng+bel}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-http-form-post-size: 50MB
    connection-timeout: 60000