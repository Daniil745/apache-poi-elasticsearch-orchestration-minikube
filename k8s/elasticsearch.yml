# Kubernetes Deployment and Service for Elasticsearch 8.11.0 single-node cluster.
#
# Memory optimization for Minikube with 5700MB total host memory:
# - JVM heap reduced to 128m-256m (from default 512m-1g)
# - Container limited to 384Mi memory / 300m CPU
# - All xpack features disabled to save RAM:
#   * Security (SSL/TLS) disabled - no encryption overhead
#   * Machine Learning disabled - saves ~500MB
#   * Watcher disabled - saves ~100MB
# - Single-node discovery for development environment
# - Image loaded locally via minikube cp to avoid external pulls
#
# Total memory footprint: ~400MB instead of ~1.5GB default

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: doc-search
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: doc-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.security.enrollment.enabled
              value: "false"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: xpack.security.transport.ssl.enabled
              value: "false"
            - name: xpack.ml.enabled
              value: "false"
            - name: xpack.watcher.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms128m -Xmx256m"
          resources:
            requests:
              memory: "200Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "300m"