# Nginx Server Block - DocSearch Reverse Proxy (default.conf)
#
# Single server listening on port 80 for localhost.
#
# /health endpoint:
#   - Returns plain text "healthy" with 200 status
#   - Used by Docker healthcheck for container monitoring
#   - Access logging disabled to reduce noise
#
# / location (main proxy):
#   - Proxies all requests to Spring Boot app on app:8080 (Docker DNS)
#   - Forwards original client IP via X-Real-IP and X-Forwarded-For headers
#   - Preserves original Host header for proper application routing
#   - Sets X-Forwarded-Proto for HTTPS awareness behind proxy
#   - 50MB client max body size for multipart document uploads
#   - 300s proxy read timeout for large file processing and OCR operations

server {
    listen 80;
    server_name localhost;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }
}