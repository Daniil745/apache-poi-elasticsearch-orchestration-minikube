# Nginx Main Configuration (nginx.conf)
#
# Global settings for Nginx reverse proxy.
# - user nginx: runs as nginx user for security (not root)
# - worker_processes auto: automatically scales to available CPU cores
# - worker_connections 1024: handles up to 1024 simultaneous connections per worker
# - sendfile on: efficient file transfer using kernel sendfile syscall
# - keepalive_timeout 65s: persistent connections for reduced latency
# - client_max_body_size 50M: allows document file uploads up to 50MB
# - include conf.d/*.conf: loads virtual host configs from conf.d directory

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    include /etc/nginx/conf.d/*.conf;
}